<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Archivio Dipendenti</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background-color: #0c1a2a;
      color: white;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .form-riga {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: nowrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    .form-riga input,
    .form-riga button {
      padding: 12px 16px;
      font-size: 14px;
      border-radius: 8px;
      border: none;
      font-weight: 500;
      text-align: center;
    }

    .form-riga input {
      background-color: white;
      color: black;
    }

    #nome, #cognome, #email, .form-riga button { width: 150px; }
    #pin { width: 60px; }

    .form-riga button {
      background-color: #4f46e5;
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    .form-riga button:hover {
      background-color: #4338ca;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #1e293b;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
    }

    th, td {
      padding: 14px 12px;
      text-align: center;
      border-bottom: 1px solid #374151;
    }

    th {
      background-color: #1f3a56;
      font-weight: 600;
      font-size: 15px;
    }

    td {
      background-color: #1e293b;
    }

    tr:last-child td {
      border-bottom: none;
    }

    td button {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      margin: 0 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="assets/icons/logo.png" alt="BadgeBox Logo" style="display:block; margin:5px auto 0; width:120px;" />
    <h1>Archivio Dipendenti</h1>

    <form id="form-aggiungi" class="form-riga">
      <input type="text" id="nome" placeholder="Nome" required />
      <input type="text" id="cognome" placeholder="Cognome" required />
      <input type="text" id="pin" placeholder="PIN" maxlength="2" required />
      <input type="email" id="email" placeholder="Email" required />
      <button type="submit">Aggiungi</button>
    </form>

    <table>
      <thead>
        <tr>
          <th>Storico</th>
          <th>PIN</th>
          <th>Nome</th>
          <th>Cognome</th>
          <th>Email</th>
          <th>Azioni</th>
        </tr>
      </thead>
      <tbody id="lista-dipendenti"></tbody>
    </table>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      "https://txmjqrnitfsiytbytxlc.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4bWpxcm5pdGZzaXl0Ynl0eGxjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTE1MzY1MDcsImV4cCI6MjA2NzExMjUwN30.lag16Oxh_UQL4WOeU9-pVxIzvUyiNQMhKUY5Y5s9DPg"
    );

    const tbody = document.getElementById("lista-dipendenti");
    const form = document.getElementById("form-aggiungi");
    const nomeInput = document.getElementById("nome");
    const cognomeInput = document.getElementById("cognome");
    const pinInput = document.getElementById("pin");
    const emailInput = document.getElementById("email");
    const btn = form.querySelector("button");

    let idDaModificare = null;

    async function caricaUtenti() {
      const { data, error } = await supabase.from("utenti").select("*").order("pin", { ascending: true });
      if (error) return alert("Errore durante il caricamento utenti: " + error.message);

      tbody.innerHTML = "";
      data.forEach(utente => {
        const pin = String(utente.pin).padStart(2, "0");
        tbody.innerHTML += `
          <tr>
            <td><a href="storico.html?pin=${utente.pin}" title="Storico"><img src="assets/icons/orologio.png" alt="Storico" style="width:24px;height:24px;" /></a></td>
            <td>${pin}</td>
            <td>${utente.nome}</td>
            <td>${utente.cognome}</td>
            <td>${utente.email}</td>
            <td>
              <button onclick="modificaUtente('${utente.id}', '${utente.nome}', '${utente.cognome}', '${utente.pin}', '${utente.email}')">✏️</button>
              <button onclick="eliminaUtente('${utente.id}')">❌</button>
            </td>
          </tr>
        `;
      });
    }

    window.modificaUtente = (id, nome, cognome, pin, email) => {
      nomeInput.value = nome;
      cognomeInput.value = cognome;
      pinInput.value = pin;
      emailInput.value = email;
      idDaModificare = id;
      btn.textContent = "Salva Modifica";
    };

    window.eliminaUtente = async (id) => {
      if (!confirm("Sei sicuro di voler eliminare questo utente?")) return;
      if (!confirm("ATTENZIONE: questa operazione è irreversibile.\nConfermi l'eliminazione definitiva?")) return;

      const { error } = await supabase.from("utenti").delete().eq("id", id);
      if (error) return alert("Errore durante l'eliminazione: " + error.message);
      caricaUtenti();
    };

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const nuovoUtente = {
        nome: nomeInput.value.trim(),
        cognome: cognomeInput.value.trim(),
        pin: pinInput.value.trim(),
        email: emailInput.value.trim()
      };

      if (Object.values(nuovoUtente).some(val => !val)) {
        alert("Compila tutti i campi.");
        return;
      }

      let errore = null;

      if (idDaModificare) {
        ({ error: errore } = await supabase.from("utenti").update(nuovoUtente).eq("id", idDaModificare));
        idDaModificare = null;
        btn.textContent = "Aggiungi";
      } else {
        ({ error: errore } = await supabase.from("utenti").insert([nuovoUtente]));
      }

      if (errore) return alert("Errore: " + errore.message);

      form.reset();
      caricaUtenti();
    });

    caricaUtenti();
  </script>
</body>
</html>
