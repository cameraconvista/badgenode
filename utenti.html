<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Gestione Utenti - BADGEBOX</title>

  <!-- PWA Meta -->
  <meta name="theme-color" content="#0d1b2b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BADGEBOX" />

  <!-- Icone PWA -->
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/BADGENODE.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/BADGENODE.png" />
  <link rel="manifest" href="manifest.json" />

  <link rel="stylesheet" href="style.css" />
  <style>
    :root {
      --bg-main: #0c1a2a;
      --bg-table: #1e293b;
      --bg-header: #1f3a56;
      --border-color: #374151;
      --text-light: #94a3b8;
      --highlight: #fbbf24;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: var(--bg-main);
      color: white;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 32px;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: var(--bg-table);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
    }

    th, td {
      padding: 8px;
      text-align: center;
      border: 1px solid var(--border-color);
    }

    th {
      background-color: var(--bg-header);
      font-weight: 600;
    }

    td button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      margin: 0 2px;
      padding: 4px;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 20px;
      gap: 10px;
    }

    .actions button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      transition: all 0.2s ease;
    }

    .btn-add { background-color: #16a34a; color: white; }
    .btn-add:hover { background-color: #15803d; }

    .btn-ex { background-color: #ca8a04; color: white; }
    .btn-ex:hover { background-color: #a16207; }

    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-content {
      background: var(--bg-table);
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      max-width: 600px;
      color: white;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
    }

    .modal-title {
      font-size: 20px;
      color: #60a5fa;
    }

    .close-btn {
      background: #dc2626;
      color: white;
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
    }

    .field-group {
      margin-bottom: 12px;
    }

    .field-label {
      font-size: 13px;
      margin-bottom: 4px;
      color: var(--text-light);
    }

    .field-input {
      width: 100%;
      padding: 8px;
      background: #374151;
      border: 1px solid #4b5563;
      border-radius: 6px;
      color: white;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-cancel, .btn-save {
      padding: 8px 16px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-cancel { background: #6b7280; color: white; }
    .btn-cancel:hover { background: #4b5563; }

    .btn-save { background: #16a34a; color: white; }
    .btn-save:hover { background: #15803d; }

    @media (max-width: 480px) {
      h1 { font-size: 22px; }
      th, td { font-size: 12px; padding: 4px; }
      .modal-content { padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="assets/icons/logoBN 2.png" alt="BadgeBox Logo" style="display:block; margin:-10px auto 20px; width:150px;" />
    <h1>Archivio Dipendenti</h1>

    <table>
      <thead>
        <tr>
          <th>Storico</th>
          <th>PIN</th>
          <th>Nome</th>
          <th>Cognome</th>
          <th>Azioni</th>
        </tr>
      </thead>
      <tbody id="lista-dipendenti">
        <!-- Riempito da JS -->
      </tbody>
    </table>

    <div class="actions">
      <button class="btn-add" onclick="openModal('add')">Aggiungi</button>
      <button class="btn-ex" onclick="window.location.href='ex-dipendenti.html'">ex Dipendenti</button>
    </div>
  </div>

  <!-- Modale Generico -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Dettagli Dipendente</div>
        <button class="close-btn" onclick="closeModal()">×</button>
      </div>

      <div id="modalBody"></div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Annulla</button>
        <button class="btn-save" onclick="salvaNuovoDipendente()">Salva</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      "https://txmjqrnitfsiytbytxlc.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
    );

    const lista = document.getElementById("lista-dipendenti");
    const modal = document.getElementById("modal");
    const modalBody = document.getElementById("modalBody");
    const modalTitle = document.getElementById("modalTitle");

    function closeModal() {
      modal.style.display = "none";
    }

    function openModal(mode, utente = null) {
      modalTitle.textContent = mode === "add" ? "Aggiungi Dipendente" : `Modifica ${utente.nome}`;
      modalBody.innerHTML = `
        <div class="field-group"><div class="field-label">Nome</div><input class="field-input" id="input-nome" value="${utente?.nome || ""}"></div>
        <div class="field-group"><div class="field-label">Cognome</div><input class="field-input" id="input-cognome" value="${utente?.cognome || ""}"></div>
        <div class="field-group"><div class="field-label">Email</div><input class="field-input" id="input-email" value="${utente?.email || ""}"></div>
        <div class="field-group"><div class="field-label">Telefono</div><input class="field-input" id="input-telefono" value="${utente?.telefono || ""}"></div>
        <div class="field-group"><div class="field-label">PIN</div><input class="field-input" id="input-pin" type="number" value="${utente?.pin || ""}"></div>
      `;
      modal.style.display = "flex";
    }

    async function salvaNuovoDipendente() {
      const pin = parseInt(document.getElementById("input-pin").value);
      const nome = document.getElementById("input-nome").value.trim();
      const cognome = document.getElementById("input-cognome").value.trim();
      const email = document.getElementById("input-email").value.trim();
      const telefono = document.getElementById("input-telefono").value.trim();

      if (!pin || !nome || !cognome || !email) return alert("Compila tutti i campi");

      const { error } = await supabase.from("utenti").insert([{ pin, nome, cognome, email, telefono }]);
      if (error) return alert("Errore: " + error.message);

      alert("Dipendente aggiunto!");
      closeModal();
      caricaUtenti();
    }

    async function caricaUtenti() {
      const { data, error } = await supabase.from("utenti").select("*").order("pin", { ascending: true });
      if (error) return alert("Errore caricamento utenti");

      lista.innerHTML = data.length === 0
        ? `<tr><td colspan="5" style="padding:30px;">Nessun dipendente</td></tr>`
        : data.map(u => `
          <tr>
            <td><a href="storico.html?pin=${u.pin}">📜</a></td>
            <td>${String(u.pin).padStart(2, '0')}</td>
            <td>${u.nome}</td>
            <td>${u.cognome}</td>
            <td>
              <button onclick='openModal("edit", ${JSON.stringify(u)})'>✏️</button>
              <button onclick='alert("Archivio in sviluppo")'>📦</button>
              <button onclick='alert("Eliminazione in sviluppo")'>❌</button>
            </td>
          </tr>`).join("");
    }

    caricaUtenti();
  </script>
</body>
</html>
