services:
  - type: web
    name: badgenode
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npx serve -s dist -l $PORT
    autoDeploy: true
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
