<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover, shrink-to-fit=no" />
  <title>BADGEBOX - Sistema Timbrature</title>

  <!-- PWA Meta -->
  <meta name="theme-color" content="#0d1b2b" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BADGEBOX" />

  <!-- Icone PWA ottimizzate -->
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/badgenode-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/badgenode-192.png" />
  <link rel="manifest" href="manifest.json" />

  <!-- Performance optimizations -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://txmjqrnitfsiytbytxlc.supabase.co" crossorigin>
  <link rel="preload" href="style.css" as="style">

  <!-- Stili -->
  <link rel="stylesheet" href="style.css" />

  <!-- Luxon per gestione date -->
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.3.0/build/global/luxon.min.js" 
          integrity="sha384-DwavIJUME7NNaTw+CuxB85mS1L5A6XkHXHWnd1hmNIzSnX48mIjZ0Nc/tPQONPwe" 
          crossorigin="anonymous"></script>
</head>
<body>
  <div class="main-container">
    <img src="assets/icons/BNLOGO.png" alt="BADGENODE" class="logo" style="width: 160px; height: auto; margin-bottom: 20px;" />
    <input type="text" id="pinInput" class="pin-display" placeholder="PIN" readonly maxlength="4" />
    <div id="status" class="status-message"></div>
    <div class="keypad">
      <button class="keypad-button">1</button>
      <button class="keypad-button">2</button>
      <button class="keypad-button">3</button>
      <button class="keypad-button">4</button>
      <button class="keypad-button">5</button>
      <button class="keypad-button">6</button>
      <button class="keypad-button">7</button>
      <button class="keypad-button">8</button>
      <button class="keypad-button">9</button>
      <button class="keypad-button">C</button>
      <button class="keypad-button">0</button>
      <button class="keypad-button" id="settings-btn" type="button" title="Impostazioni" aria-label="Impostazioni">⚙️</button>
    </div>
    <div class="date-time-section">
      <div class="date-text" id="dataGiorno"></div>
      <div class="time-text" id="ora"></div>
    </div>
    <div class="action-buttons">
      <button class="action-button entrata">Entrata</button>
      <button class="action-button uscita">Uscita</button>
    </div>
  </div>

  <!-- Script principale -->
  <script type="module" src="./main.js"></script>

    <script>

    function mostraModalAdmin() {
      const existingModal = document.getElementById('adminModal');
      if (existingModal) existingModal.remove();

      const modalHTML = `
        <div id="adminModal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; align-items: center; justify-content: center;">
          <div style="background: #1e293b; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.5); min-width: 300px;">
            <h3 style="color: white; margin-bottom: 20px;">Accesso Amministratore</h3>
            <input type="password" id="adminPinInput" placeholder="Inserisci PIN admin" 
                   style="width: 100%; padding: 12px; font-size: 18px; text-align: center; border: none; border-radius: 8px; margin-bottom: 20px; letter-spacing: 2px; box-sizing: border-box;" maxlength="4" />
            <div>
              <button onclick="verificaPinAdmin()" style="background: #15803d; color: white; border: none; padding: 12px 20px; margin: 0 10px; border-radius: 8px; cursor: pointer; font-size: 16px;">Conferma</button>
              <button onclick="chiudiModalAdmin()" style="background: #dc2626; color: white; border: none; padding: 12px 20px; margin: 0 10px; border-radius: 8px; cursor: pointer; font-size: 16px;">Annulla</button>
            </div>
          </div>
        </div>
      `;

      document.body.insertAdjacentHTML('beforeend', modalHTML);

      setTimeout(() => {
        const adminInput = document.getElementById('adminPinInput');
        if (adminInput) {
          adminInput.focus();
          adminInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
              e.preventDefault();
              verificaPinAdmin();
            }
          });
        }
      }, 100);

      document.addEventListener('keydown', function handleEscape(e) {
        if (e.key === 'Escape') {
          chiudiModalAdmin();
          document.removeEventListener('keydown', handleEscape);
        }
      });
    }

    window.verificaPinAdmin = function() {
      console.log("🔧 verificaPinAdmin chiamata");
      const pinAdmin = document.getElementById('adminPinInput')?.value.trim();
      console.log("🔧 PIN inserito:", pinAdmin);
      if (pinAdmin === "1909") {
        console.log("🔧 PIN corretto! Navigando...");
        chiudiModalAdmin();
        window.location.href = "utenti.html";
      } else {
        console.log("🔧 PIN errato");
        alert("PIN non valido. Accesso negato.");
        const input = document.getElementById('adminPinInput');
        if (input) {
          input.value = '';
          input.focus();
        }
      }
    };

    window.chiudiModalAdmin = function() {
      const modal = document.getElementById('adminModal');
      if (modal) modal.remove();
    };

    // Gestione keypad ottimizzata
    document.querySelectorAll(".keypad-button").forEach((key) => {
      key.addEventListener("click", () => {
        const text = key.textContent;

        if (key.id === 'settings-btn') {
          apriImpostazioni();
        } else if (text === 'C') {
          pinInput.value = '';
        } else if (pinInput.value.length < 4 && /^[0-9]$/.test(text)) {
          pinInput.value += text;
        }
      });
    });

    // Sistema timbrature ottimizzato
    async function registraTimbratura(tipo) {
      const pin = pinInput.value.trim();
      if (!pin) {
        mostraStatus("Inserisci il PIN", "warning");
        return;
      }

      try {
        mostraStatus("Verifica in corso...", "loading");

        if (!window.supabase) {
          mostraStatus("Errore: connessione database non disponibile", "error");
          return;
        }

        const { data: utente, error: erroreUtente } = await window.supabase
          .from("utenti")
          .select("*")
          .eq("pin", parseInt(pin))
          .single();

        if (erroreUtente || !utente) {
          mostraStatus("PIN non trovato", "error");
          return;
        }

        // Controllo anti-duplicazione
        const { data: ultimaTimbratura, error: erroreUltima } = await window.supabase
          .from("timbrature")
          .select("tipo, created_at, data, ore")
          .eq("pin", parseInt(pin))
          .order("created_at", { ascending: false })
          .limit(1);

        if (erroreUltima && erroreUltima.code !== 'PGRST116') {
          console.error("Errore verifica ultima timbratura:", erroreUltima);
          mostraStatus("Errore di sistema", "error");
          return;
        }

        if (ultimaTimbratura && ultimaTimbratura.length > 0) {
          const ultimoTipo = ultimaTimbratura[0].tipo;
          if (ultimoTipo === tipo) {
            const ultimaData = ultimaTimbratura[0].data;
            const ultimaOra = ultimaTimbratura[0].ore;
            const messaggioBlocco = tipo === "entrata" ? 
              `⚠️ ENTRATA già registrata!\nUltima: ${ultimaData} ${ultimaOra.slice(0,5)}\n\nDevi prima fare l'USCITA.` :
              `⚠️ USCITA già registrata!\nUltima: ${ultimaData} ${ultimaOra.slice(0,5)}\n\nDevi prima fare l'ENTRATA.`;
            mostraStatus(messaggioBlocco, "error", 8000);
            return;
          }
        }

        const ora = DateTime.now().setZone("Europe/Rome");

        // Calcolo giorno logico
        let giornoLogico = ora.toISODate();
        if (ora.hour >= 0 && ora.hour < 5) {
          giornoLogico = ora.minus({ days: 1 }).toISODate();
        }

        const oraFormatted = ora.toFormat("HH:mm:ss");

        const nuovaTimbratura = {
          tipo, 
          pin: parseInt(pin), 
          nome: utente.nome, 
          cognome: utente.cognome,
          data: ora.toISODate(), 
          ore: oraFormatted,
          giornologico: giornoLogico
        };

        const { error } = await window.supabase
          .from('timbrature')
          .insert([nuovaTimbratura]);

        if (error) {
          console.error("Errore inserimento timbratura:", error);
          throw new Error("Errore durante la registrazione: " + error.message);
        }

        mostraStatus(`${utente.nome} ${utente.cognome}\n${tipo.toUpperCase()} ${ora.toFormat("HH:mm")}`, "success", 7000);
        pinInput.value = '';

      } catch (e) {
        console.error("Errore generale:", e);
        mostraStatus(e.message || "Errore di connessione", "error", 6000);
      }
    }

    // Event listeners pulsanti azione
    document.querySelector(".entrata").addEventListener("click", () => {
      if (!pinInput.value.trim()) {
        mostraStatus("Inserisci il PIN", "warning");
        return;
      }
      registraTimbratura("entrata");
    });

    document.querySelector(".uscita").addEventListener("click", () => {
      if (!pinInput.value.trim()) {
        mostraStatus("Inserisci il PIN", "warning");
        return;
      }
      registraTimbratura("uscita");
    });

    // Inizializzazione
    aggiornaDataOra();
    setInterval(aggiornaDataOra, 1000);
    pinInput.focus();
  </script>

  <!-- PWA Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js?v=20250911')
          .then((registration) => {
            console.log('[SW] Registered:', registration.scope);
          })
          .catch((error) => {
            console.error('[SW] Registration failed:', error);
          });
      });
    }
  </script>
  </script>
</body>
</html>
