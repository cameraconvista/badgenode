
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ex Dipendenti - BADGEBOX</title>

  <!-- PWA Meta -->
  <meta name="theme-color" content="#0d1b2b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BADGEBOX" />

  <!-- Icone PWA -->
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/BADGENODE.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/BADGENODE.png" />
  <link rel="manifest" href="manifest.json" />

  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background-color: #0c1a2a;
      color: white;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 36px;
      font-weight: bold;
      color: #fbbf24;
    }

    .back-button {
      position: absolute;
      top: 20px;
      left: 20px;
      background-color: #2563eb;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .back-button:hover {
      background-color: #1d4ed8;
      transform: translateY(-2px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #1e293b;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
      table-layout: fixed;
    }

    th, td {
      padding: 3px 8px;
      height: 28px;
      text-align: center;
      border-bottom: 1px solid #374151;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    th {
      background-color: #1f3a56;
      font-weight: 600;
      font-size: 18px;
      color: #fbbf24;
    }

    td {
      font-size: 16px;
      background-color: #1e293b;
    }

    /* Larghezze specifiche per le colonne */
    th:nth-child(1), td:nth-child(1) { width: 20%; } /* Nome */
    th:nth-child(2), td:nth-child(2) { width: 20%; } /* Cognome */
    th:nth-child(3), td:nth-child(3) { width: 15%; } /* Data Archiviazione */
    th:nth-child(4), td:nth-child(4) { width: 15%; } /* Timbrature */
    th:nth-child(5), td:nth-child(5) { width: 30%; } /* Azioni */

    /* Ottimizzazione colonna azioni */
    td:nth-child(5) {
      white-space: nowrap;
      text-align: center;
    }

    td:nth-child(5) .download-btn,
    td:nth-child(5) .restore-btn {
      display: inline-block;
      margin: 0 2px;
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 4px;
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover {
      background-color: #2563eb;
    }

    .download-btn {
      background-color: #10b981;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .download-btn:hover {
      background-color: #059669;
      transform: translateY(-2px);
    }

    .restore-btn {
      background-color: #f59e0b;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-left: 8px;
    }

    .restore-btn:hover {
      background-color: #d97706;
      transform: translateY(-2px);
    }

    .empty-message {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
      font-size: 18px;
    }

    .info-badge {
      background-color: #3b82f6;
      color: white;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-badge {
      background-color: #dc2626;
      color: white;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .container {
        padding: 20px;
      }

      h1 {
        font-size: 28px;
        margin-top: 60px;
      }

      .back-button {
        top: 10px;
        left: 10px;
        padding: 8px 16px;
        font-size: 14px;
      }

      th, td {
        padding: 2px 4px;
        height: 24px;
        font-size: 12px;
      }

      th {
        font-size: 14px;
      }

      /* Ridimensiona pulsanti per mobile */
      .download-btn {
        padding: 3px 6px;
        font-size: 10px;
        margin: 0 1px;
      }

      .restore-btn {
        padding: 3px 5px;
        font-size: 10px;
        margin: 0 1px;
      }

      /* Larghezze colonne ottimizzate per mobile */
      th:nth-child(1), td:nth-child(1) { width: 18%; } /* Nome */
      th:nth-child(2), td:nth-child(2) { width: 18%; } /* Cognome */
      th:nth-child(3), td:nth-child(3) { width: 14%; } /* Data */
      th:nth-child(4), td:nth-child(4) { width: 12%; } /* Timbrature */
      th:nth-child(5), td:nth-child(5) { width: 38%; } /* Azioni */
    }

    @media (min-width: 1024px) {
      .container {
        max-width: 1400px;
        padding: 40px;
      }

      h1 {
        font-size: 42px;
        margin-bottom: 40px;
      }

      table {
        border-radius: 20px;
      }

      th, td {
        padding: 4px 12px;
        height: 32px;
      }

      th {
        font-size: 20px;
      }

      td {
        font-size: 18px;
      }

      .download-btn {
        padding: 6px 12px;
        font-size: 14px;
        margin: 0 3px;
      }

      .restore-btn {
        padding: 6px 10px;
        font-size: 12px;
        margin: 0 3px;
      }

      /* Larghezze colonne ottimizzate per desktop */
      th:nth-child(1), td:nth-child(1) { width: 22%; } /* Nome */
      th:nth-child(2), td:nth-child(2) { width: 22%; } /* Cognome */
      th:nth-child(3), td:nth-child(3) { width: 16%; } /* Data */
      th:nth-child(4), td:nth-child(4) { width: 14%; } /* Timbrature */
      th:nth-child(5), td:nth-child(5) { width: 26%; } /* Azioni */
    }
  </style>
</head>
<body>
  <a href="utenti.html" class="back-button">← Torna ai Dipendenti</a>
  
  <div class="container">
    <img src="assets/icons/logo.png" alt="BadgeBox Logo" style="display:block; margin:5px auto 0; width:150px;" />
    <h1>📚 Archivio Ex Dipendenti</h1>

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Cognome</th>
          <th>Archiviazione</th>
          <th>Record</th>
          <th>Azioni</th>
        </tr>
      </thead>
      <tbody id="lista-ex-dipendenti">
        <tr>
          <td colspan="5" class="empty-message">
            <div>📂 Nessun dipendente archiviato</div>
            <small style="display: block; margin-top: 10px; color: #6b7280;">
              I dipendenti archiviati appariranno qui con la possibilità di scaricare il file Excel completo
            </small>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      "https://txmjqrnitfsiytbytxlc.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4bWpxcm5pdGZzaXl0Ynl0eGxjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTE1MzY1MDcsImV4cCI6MjA2NzExMjUwN30.lag16Oxh_UQL4WOeU9-pVxIzvUyiNQMhKUY5Y5s9DPg"
    );

    const tbody = document.getElementById("lista-ex-dipendenti");

    async function caricaExDipendenti() {
      try {
        const { data, error } = await supabase
          .from("dipendenti_archiviati")
          .select("*")
          .order("data_archiviazione", { ascending: false });

        if (error) {
          console.error("Errore caricamento ex dipendenti:", error);
          alert("Errore durante il caricamento: " + error.message);
          return;
        }

        tbody.innerHTML = "";

        if (!data || data.length === 0) {
          tbody.innerHTML = `
            <tr>
              <td colspan="5" class="empty-message">
                <div>📂 Nessun dipendente archiviato</div>
                <small style="display: block; margin-top: 10px; color: #6b7280;">
                  I dipendenti archiviati appariranno qui con la possibilità di scaricare il file Excel completo
                </small>
              </td>
            </tr>
          `;
          return;
        }

        data.forEach(exDipendente => {
          const dataArchiviazione = new Date(exDipendente.data_archiviazione).toLocaleDateString('it-IT');
          let excelData = null;
          let numeroTimbrature = 0;

          // Prova a parsare i dati Excel
          try {
            if (exDipendente.file_excel_path) {
              excelData = JSON.parse(exDipendente.file_excel_path);
              numeroTimbrature = excelData.totaleTimbrature || 0;
            }
          } catch (e) {
            console.warn("Errore parsing dati Excel per", exDipendente.nome, e);
          }

          const riga = document.createElement('tr');
          riga.innerHTML = `
            <td title="${exDipendente.nome}">${exDipendente.nome}</td>
            <td title="${exDipendente.cognome}">${exDipendente.cognome}</td>
            <td title="${dataArchiviazione}">${dataArchiviazione}</td>
            <td>
              <span class="info-badge">${numeroTimbrature}</span>
            </td>
            <td>
              <button class="download-btn" onclick="scaricaExcel('${exDipendente.id}', '${exDipendente.nome}', '${exDipendente.cognome}')" title="Scarica Excel">
                📊 Excel
              </button>
              <button class="restore-btn" onclick="ripristinaDipendente('${exDipendente.id}', '${exDipendente.nome}', '${exDipendente.cognome}')" title="Ripristina">
                ↩️ Ripristina
              </button>
            </td>
          `;
          tbody.appendChild(riga);
        });

      } catch (error) {
        console.error("Errore imprevisto:", error);
        alert("Errore durante il caricamento ex dipendenti");
      }
    }

    // Funzione per scaricare il file Excel
    window.scaricaExcel = async (id, nome, cognome) => {
      try {
        const { data, error } = await supabase
          .from("dipendenti_archiviati")
          .select("file_excel_path, file_excel_name")
          .eq("id", id)
          .single();

        if (error) {
          console.error("Errore recupero file:", error);
          alert("Errore durante il recupero del file: " + error.message);
          return;
        }

        if (!data.file_excel_path) {
          alert("File Excel non disponibile per questo dipendente");
          return;
        }

        // Parsa i dati
        const excelData = JSON.parse(data.file_excel_path);
        
        // Genera contenuto CSV per compatibilità Excel
        let csvContent = "data:text/csv;charset=utf-8,";
        
        // Header informazioni dipendente
        csvContent += "INFORMAZIONI DIPENDENTE\n";
        csvContent += "Nome,Cognome,PIN,Email,Telefono,Ore Contrattuali\n";
        csvContent += `"${excelData.dipendente.nome}","${excelData.dipendente.cognome}",${excelData.dipendente.pin},"${excelData.dipendente.email}","${excelData.dipendente.telefono || 'N/A'}",${excelData.dipendente.ore_contrattuali}\n\n`;
        
        // Header timbrature
        csvContent += "STORICO TIMBRATURE\n";
        csvContent += "Data,Ora,Tipo,PIN,Nome,Cognome\n";
        
        // Dati timbrature
        if (excelData.timbrature && excelData.timbrature.length > 0) {
          excelData.timbrature.forEach(timbratura => {
            csvContent += `"${timbratura.data}","${timbratura.ore}","${timbratura.tipo}",${timbratura.pin},"${timbratura.nome}","${timbratura.cognome}"\n`;
          });
        }

        // Footer statistiche
        csvContent += `\nTOTALE TIMBRATURE: ${excelData.totaleTimbrature || 0}\n`;
        csvContent += `GENERATO IL: ${new Date(excelData.dataGenerazione).toLocaleString('it-IT')}\n`;

        // Crea e scarica il file
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `${nome}_${cognome}_timbrature_completo.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        console.log(`File scaricato per ${nome} ${cognome}:`, excelData);

      } catch (error) {
        console.error("Errore scaricamento file:", error);
        alert("Errore durante lo scaricamento del file");
      }
    };

    // Funzione per ripristinare un dipendente dall'archivio
    window.ripristinaDipendente = async (id, nome, cognome) => {
      if (!confirm(`Sei sicuro di voler ripristinare ${nome} ${cognome} tra i dipendenti attivi?`)) return;
      if (!confirm("ATTENZIONE: Le timbrature archiviate NON verranno ripristinate.\nIl dipendente tornerà attivo con storico vuoto.\nConfermi il ripristino?")) return;

      try {
        // 1. Recupera i dati dell'ex dipendente
        const { data: exDipendente, error: errorRecupero } = await supabase
          .from("dipendenti_archiviati")
          .select("*")
          .eq("id", id)
          .single();

        if (errorRecupero) {
          console.error("Errore recupero ex dipendente:", errorRecupero);
          alert("Errore durante il recupero: " + errorRecupero.message);
          return;
        }

        // 2. Verifica che il PIN non sia già in uso
        const { data: pinEsistente, error: errorPin } = await supabase
          .from("utenti")
          .select("pin")
          .eq("pin", exDipendente.pin);

        if (errorPin) {
          console.error("Errore verifica PIN:", errorPin);
          alert("Errore durante la verifica PIN: " + errorPin.message);
          return;
        }

        if (pinEsistente && pinEsistente.length > 0) {
          alert(`Impossibile ripristinare: PIN ${exDipendente.pin} già in uso da un altro dipendente attivo`);
          return;
        }

        // 3. Ripristina nella tabella utenti
        const { error: errorInserimento } = await supabase
          .from("utenti")
          .insert([{
            pin: exDipendente.pin,
            nome: exDipendente.nome,
            cognome: exDipendente.cognome,
            email: exDipendente.email,
            telefono: exDipendente.telefono,
            ore_contrattuali: exDipendente.ore_contrattuali,
            descrizione_contratto: exDipendente.descrizione_contratto
          }]);

        if (errorInserimento) {
          console.error("Errore inserimento utente:", errorInserimento);
          alert("Errore durante il ripristino: " + errorInserimento.message);
          return;
        }

        // 4. Rimuovi dall'archivio
        const { error: errorRimozione } = await supabase
          .from("dipendenti_archiviati")
          .delete()
          .eq("id", id);

        if (errorRimozione) {
          console.error("Errore rimozione da archivio:", errorRimozione);
          alert("Errore durante la rimozione dall'archivio: " + errorRimozione.message);
          return;
        }

        alert(`✅ ${nome} ${cognome} ripristinato con successo!\nIl dipendente è tornato attivo con PIN ${exDipendente.pin}.`);
        caricaExDipendenti(); // Ricarica la lista

      } catch (error) {
        console.error("Errore imprevisto:", error);
        alert("Errore durante il ripristino");
      }
    };

    // Carica dati all'avvio
    caricaExDipendenti();
  </script>
</body>
</html>
