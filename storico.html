<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover, shrink-to-fit=no" />
  <title>Storico Timbrature - BADGEBOX</title>

  <!-- PWA Meta -->
  <meta name="theme-color" content="#0d1b2b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BADGEBOX" />

  <!-- Icone PWA -->
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/BADGENODE.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/BADGENODE.png" />
  <link rel="manifest" href="manifest.json" />

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="assets/styles/storico-styles.css" />
</head>
<body>
  <div class="container">
    <button id="torna-utenti" class="btn-torna-utenti" title="Torna a Utenti">
      ⬅
    </button>

    <div class="header-fisso">
      <div style="position: relative; text-align: center; margin-bottom: 10px;">
        <p class="titolo-piccolo">Storico Timbrature</p>
        <h1 id="intestazione" class="titolo-grande">Nome Cognome</h1>
      </div>

      <div class="filtro-e-pulsanti">
        <div class="filtro-temporale">
          <select id="filtro-mese">
            <option value="corrente">Mese corrente</option>
            <option value="precedente">Mese precedente</option>
            <option value="due-precedenti">2 mesi precedenti</option>
          </select>
          <div class="data-container">
            <input type="date" id="data-inizio" />
            <img src="assets/icons/calendario.png" class="icona-calendario-campo" alt="Calendario" data-campo="data-inizio" />
          </div>
          <div class="data-container">
            <input type="date" id="data-fine" />
            <img src="assets/icons/calendario.png" class="icona-calendario-campo" alt="Calendario" data-campo="data-fine" />
          </div>
        </div>

        <div class="pulsanti-alto">
          <button id="btn-whatsapp" title="Condividi su WhatsApp">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893A11.821 11.821 0 0020.893 3.384" fill="#25D366"/>
            </svg>
          </button>
          <button id="btn-invia" title="Scarica PDF">
            <img src="assets/icons/pdf.png" alt="PDF" />
          </button>
          <button id="btn-google-sheets" title="Esporta Google Fogli">
            <img src="assets/icons/googlesheet.png" alt="Google Fogli" />
          </button>
          <button id="btn-esporta" title="Esporta Excel">
            <img src="assets/icons/esporta.png" alt="Esporta Excel" />
          </button>
        </div>
      </div>
    </div>

    <div class="tabella-wrapper">
      <div class="tabella-container">
        <div class="tabella-header">
          <table>
            <thead>
              <tr>
                <th>Data</th>
                <th>Entrata</th>
                <th>Uscita</th>
                <th>Ore</th>
                <th>Extra</th>
                <th>Modifica</th>
              </tr>
            </thead>
          </table>
        </div>
        <div class="tabella-body-wrapper">
          <table>
            <tbody id="storico-body"></tbody>
          </table>
        </div>
        <div class="tabella-footer">
          <table>
            <tbody id="totale-footer"></tbody>
          </table>
        </div>
      </div>
    </div>


  </div>
</body>

  <div id="modalOverlay">
    <div id="modal">
      <h2>Modifica Timbrature</h2>
      <form id="modaleForm">
        <label>Data:</label>
        <input type="date" id="modale-data" disabled />
        <label for="modale-entrata">Entrata:</label>
        <input type="time" id="modale-entrata" />
        <label for="modale-uscita">Uscita:</label>
        <input type="time" id="modale-uscita" />
        <div class="modal-btns">
          <button type="button" id="btnSalva">Salva</button>
          <button type="button" id="btnElimina">Elimina</button>
          <button type="button" id="btnChiudi">Chiudi</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module" src="assets/scripts/storico-logic.js"></script>
</body>
</html>
